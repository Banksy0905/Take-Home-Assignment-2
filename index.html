<!DOCTYPE html>
<html lang="en">
<head>
    <title>Random Quote Generator</title>
</head>
<body>

    <h1>Famous Quote Generator</h1>

    <!-- Button -->
    <button id="quoteBtn">Click me to get a famous quote</button>

    <!-- Area to display quote -->
    <p id="quoteDisplay"></p>

    <script>
        // Step 1: Store quotes in an array
        const quotes = [
            "Be yourself; everyone else is already taken. – Oscar Wilde",
            "It’s not whether you get knocked down; it’s whether you get up. — Vince Lombardi",
            "Do what you can, with what you have. – Theodore Roosevelt",
            "Success is not final, failure is not fatal. – Winston Churchill",
            "Believe you can and you're halfway there. – Theodore Roosevelt",
            "Just play. Have fun. Enjoy the game. — Michael Jordan",
            "Turn your wounds into wisdom. – Oprah Winfrey",
            "Impossible is just a big word thrown around by small men... — Muhammad Ali",
            "Champions keep playing until they get it right. - Billie Jean King"
        ];

        // Step 2: Grab HTML elements
        const button = document.getElementById("quoteBtn");
        const display = document.getElementById("quoteDisplay");

        // Step 3: Add click event
        button.addEventListener("click", function() {

            // Step 4: Generate random index
            const randomIndex = Math.floor(Math.random() * quotes.length);

            // Step 5: Display quote
            display.textContent = quotes[randomIndex];
        });
    </script>

</body>
</html>
